<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Aduanas Interactivo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-blue-400 border-b border-slate-700 pb-4">Panel de Movimientos Aduaneros</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-slate-800 p-6 rounded-lg shadow-lg border border-slate-700">
                <h3 class="text-gray-400 text-sm uppercase">Total Trámites</h3>
                <p id="kpi-total" class="text-4xl font-bold text-blue-500">Cargando...</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-slate-800 p-4 rounded-lg shadow-xl"><canvas id="chart-clientes"></canvas></div>
            <div class="bg-slate-800 p-4 rounded-lg shadow-xl"><canvas id="chart-antidroga"></canvas></div>
        </div>
    </div>

    <script>
        // Esta función lee el archivo de la carpeta automáticamente
        async function cargarDatos() {
            try {
                // El archivo DEBE llamarse así y estar en la misma carpeta
                const respuesta = await fetch('datos_aduana.csv');
                const texto = await respuesta.text();
                
                Papa.parse(texto, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        renderizarDashboard(results.data);
                    }
                });
            } catch (error) {
                console.error("Error al cargar:", error);
                document.getElementById('kpi-total').innerText = "Error: Ejecuta servidor local";
            }
        }

        function renderizarDashboard(data) {
            document.getElementById('kpi-total').innerText = data.length;
            
            // Gráfico de Clientes
            const clientes = data.reduce((acc, d) => { acc[d.CLIENTE] = (acc[d.CLIENTE] || 0) + 1; return acc; }, {});
            new Chart(document.getElementById('chart-clientes'), {
                type: 'bar',
                data: {
                    labels: Object.keys(clientes).slice(0, 5),
                    datasets: [{ label: 'Movimientos por Cliente', data: Object.values(clientes).slice(0, 5), backgroundColor: '#3b82f6' }]
                }
            });
        }

        window.onload = cargarDatos;
    </script>
</body>
</html>
